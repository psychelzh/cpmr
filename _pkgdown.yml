url: https://psychelzh.github.io/cpmr/
template:
  bootstrap: 5

navbar:
  structure:
    left: [reference, articles, news]
    right: [search, github]

articles:
  - title: Get Started
    navbar: ~
    contents:
      - native-getting-started
      - workflow-selection
      - anti-leakage-covariates

reference:
  - title: Native Fit API
    desc: Primary entry points for fitting CPM models natively.
    contents:
      - cpm_spec
      - fit_resamples

  - title: Specification Helpers
    desc: Helper constructors for composing CPM model specifications.
    contents:
      - cpm_selection_cor
      - cpm_construction_strength
      - cpm_weighting
      - cpm_model_lm

  - title: Result Objects
    desc: S3 result classes returned by single-fit and resampling workflows.
    contents:
      - cpm
      - cpm_resamples

  - title: Inspect Results
    desc: Summary and tidying helpers for fitted results.
    contents:
      - resample_metrics
      - summary.cpm
      - summary.cpm_resamples
      - tidy.cpm

  - title: Package
    contents:
      - cpmr-package
